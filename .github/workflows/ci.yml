name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false

      - name: Install C build tools
        run: sudo apt-get install -y gcc

      - name: Vendor blst C sources
        run: ./scripts/vendor-blst.sh

      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Test
        run: CGO_ENABLED=1 go test ./...

      # Cross-checks BLS signing (DSTs and real signatures) against
      # avalanchego's own bls package — catches the failure mode where
      # PoP/registration works but every warp signature is rejected.
      - name: BLS compatibility tests (compat module)
        run: cd compat && CGO_ENABLED=1 go test ./...

      # The enclave and vault-plugin are separate modules the root
      # go test cannot see — make sure they at least compile.
      - name: Build enclave module
        run: cd enclave && CGO_ENABLED=1 go build ./...

      - name: Build vault-plugin module
        run: cd vault-plugin && CGO_ENABLED=1 go build ./...
